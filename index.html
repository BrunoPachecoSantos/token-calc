<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Custo de IA</title>
  <style>
    :root {
      --page-bg: #eef3f8;
      --card-bg: #ffffff;
      --text: #172033;
      --muted: #5f6f86;
      --border: #d8e1ec;
      --accent: #1267d8;
      --accent-dark: #0b4fa8;
      --result-bg: #f4f8ff;
      --error-bg: #fff4f2;
      --error-border: #f0b5ad;
      --error-text: #9d2d20;
      --shadow: 0 20px 60px rgba(23, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(18, 103, 216, 0.08), transparent 34%),
        var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-card {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid rgba(216, 225, 236, 0.75);
      border-radius: 8px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.15;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(18, 103, 216, 0.14);
    }

    button {
      width: 100%;
      margin-top: 6px;
      padding: 13px 18px;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(18, 103, 216, 0.18);
    }

    .result-box {
      margin-top: 24px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--result-bg);
    }

    .result-box.error {
      border-color: var(--error-border);
      color: var(--error-text);
      background: var(--error-bg);
      font-weight: 700;
    }

    .result-title {
      margin: 0 0 12px;
      font-weight: 700;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin: 0;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(216, 225, 236, 0.8);
    }

    .result-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
      font-weight: 700;
    }

    @media (max-width: 540px) {
      body {
        padding: 16px;
      }

      .app-card {
        padding: 24px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .result-row {
        display: grid;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="app-card">
    <h1>Calculadora de custo de IA</h1>
    <p class="intro">
      Estima o custo de uma chamada a um modelo com base nos tokens de input e output.
    </p>

    <form id="calculator-form" class="form-grid" novalidate>
      <label for="input-tokens">
        Tokens de input
        <input id="input-tokens" type="number" min="1" step="1" placeholder="Ex.: 12000">
      </label>

      <label for="output-tokens">
        Tokens de output
        <input id="output-tokens" type="number" min="1" step="1" placeholder="Ex.: 3500">
      </label>

      <label for="model-select">
        Modelo
        <select id="model-select">
          <option value="fastmini">FastMini</option>
          <option value="balancedpro">BalancedPro</option>
          <option value="reasonmax">ReasonMax</option>
        </select>
      </label>

      <button type="submit">Calcular</button>
    </form>

    <section id="result" class="result-box" aria-live="polite">
      Introduz os valores e clica em Calcular para ver o custo estimado.
    </section>
  </main>

  <script>
    // Preços fictícios por 1 milhão de tokens.
    const MODELS = {
      fastmini: {
        name: 'FastMini',
        inputPrice: 0.10,
        outputPrice: 0.40
      },
      balancedpro: {
        name: 'BalancedPro',
        inputPrice: 1.00,
        outputPrice: 3.00
      },
      reasonmax: {
        name: 'ReasonMax',
        inputPrice: 5.00,
        outputPrice: 15.00
      }
    };

    function formatEuro(value) {
      return value.toFixed(6) + ' €';
    }

    function readPositiveNumber(value, fieldName) {
      const number = Number(value);

      if (!Number.isFinite(number) || number <= 0) {
        throw new Error(fieldName + ' deve ser um número positivo.');
      }

      return number;
    }

    function calculateCost(inputTokens, outputTokens, modelKey) {
      const model = MODELS[modelKey];

      if (!model) {
        throw new Error('Seleciona um modelo válido.');
      }

      const validInputTokens = readPositiveNumber(inputTokens, 'Tokens de input');
      const validOutputTokens = readPositiveNumber(outputTokens, 'Tokens de output');
      const inputCost = validInputTokens / 1000000 * model.inputPrice;
      const outputCost = validOutputTokens / 1000000 * model.outputPrice;

      return {
        modelName: model.name,
        inputCost: inputCost,
        outputCost: outputCost,
        totalCost: inputCost + outputCost
      };
    }

    function showError(message) {
      const resultElement = document.getElementById('result');
      resultElement.className = 'result-box error';
      resultElement.textContent = message;
    }

    function showResult(cost) {
      const resultElement = document.getElementById('result');
      resultElement.className = 'result-box';
      resultElement.innerHTML = `
        <p class="result-title">Resultado</p>
        <dl class="result-list">
          <div class="result-row">
            <dt>Modelo escolhido</dt>
            <dd>${cost.modelName}</dd>
          </div>
          <div class="result-row">
            <dt>Custo de input</dt>
            <dd>${formatEuro(cost.inputCost)}</dd>
          </div>
          <div class="result-row">
            <dt>Custo de output</dt>
            <dd>${formatEuro(cost.outputCost)}</dd>
          </div>
          <div class="result-row">
            <dt>Custo total</dt>
            <dd>${formatEuro(cost.totalCost)}</dd>
          </div>
        </dl>
      `;
    }

    function handleSubmit(event) {
      event.preventDefault();

      const inputTokens = document.getElementById('input-tokens').value;
      const outputTokens = document.getElementById('output-tokens').value;
      const modelKey = document.getElementById('model-select').value;

      try {
        const cost = calculateCost(inputTokens, outputTokens, modelKey);
        showResult(cost);
      } catch (error) {
        showError(error.message);
      }
    }

    function initCalculator() {
      document
        .getElementById('calculator-form')
        .addEventListener('submit', handleSubmit);
    }

    // Exposição simples para testes automatizados e leitura pelos alunos.
    window.AppCalculator = {
      MODELS,
      formatEuro,
      calculateCost
    };

    document.addEventListener('DOMContentLoaded', initCalculator);
  </script>
</body>
</html>
